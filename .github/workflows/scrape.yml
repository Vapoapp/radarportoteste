name: Scrape Porto Data

on:
  schedule:
    - cron: '*/5 * * * *'  # roda a cada 5 minutos
  workflow_dispatch:          # permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Scrape + ingestão
        run: |
          node scrape.js; CODE=$?
          # Contrato de exit codes do scrape.js:
          #   exit 0 → houve eventos novos ou remarcações  → commita
          #   exit 2 → sem eventos novos (ciclo normal)    → não commita, mas não é erro
          #   exit 1 → erro real (portos falharam, crash)  → falha o job
          if [ "$CODE" = "1" ]; then
            echo "Scrape terminou com erro real — abortando."
            exit 1
          fi
          echo "Scrape OK (exit $CODE)"
 
      - name: Commit e push
        run: |
          set -e
 
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          git add \
            data/vessels.json \
            data/estado_atual.json \
            data/eventos/ \
            data/snapshots/ \
            data/metricas/ \
            data/embarcacoes/ \
            data/descartes/ || true
 
          if git diff --staged --quiet; then
            echo "Nenhuma alteração nos dados — commit ignorado."
            exit 0
          fi
 
          MSG="data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git commit -m "$MSG"
          echo "Commit criado: $MSG"
 
          PUSHED=0
          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push realizado com sucesso na tentativa $i."
              PUSHED=1
              break
            fi
            WAIT=$((i * 10))
            echo "Push falhou na tentativa $i. Aguardando ${WAIT}s antes de tentar novamente..."
            sleep $WAIT
          done
 
          if [ "$PUSHED" -eq 0 ]; then
            echo "ERRO: push falhou após 5 tentativas."
            exit 1
          fi
 
