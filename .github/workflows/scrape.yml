name: Scrape Porto Data

on:
  schedule:
    - cron: '*/5 * * * *'  # roda a cada 5 minutos
  workflow_dispatch:          # permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape + ingestão
        id: scrape
        run: |
          node scrape.js || true
        # exit 0 = houve eventos novos
        # exit 2 = sem eventos novos
        # em ambos os casos, commita se houver qualquer mudança nos arquivos

      - name: Commit e push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vessels.json data/estado_atual.json data/eventos/ data/snapshots/ data/metricas/ data/embarcacoes/
          if ! git diff --staged --quiet; then
            git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Retry loop: pull --rebase + push até 5 tentativas.
            # Necessário porque dois jobs podem rodar em paralelo (schedule + manual)
            # e o push pode ser rejeitado se outro job commitou no intervalo.
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push origin main && break
              echo "Push rejeitado (tentativa $i/5), aguardando e tentando novamente..."
              sleep $((i * 5))
            done
          fi
