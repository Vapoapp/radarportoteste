name: Scrape Porto Data

on:
  schedule:
    - cron: '*/30 * * * *'  # roda a cada 30 minutos
  workflow_dispatch:          # permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape + ingestão
        id: scrape
        run: |
          node scrape.js || true
        # exit 0 = houve eventos novos
        # exit 2 = sem eventos novos
        # em ambos os casos, commita se houver qualquer mudança nos arquivos

      - name: Commit e push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vessels.json data/estado_atual.json data/eventos/ data/snapshots/ data/metricas/ data/embarcacoes/
          if ! git diff --staged --quiet; then
            git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
          fi
