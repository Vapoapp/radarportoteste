name: Scrape Porto Data

on:
  schedule:
    - cron: '*/5 * * * *'  # roda a cada 5 minutos
  workflow_dispatch:          # permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Scrape + ingestão
        id: scrape
        run: |
          node scrape.js; CODE=$?
          echo "exit_code=$CODE" >> $GITHUB_OUTPUT
          # Contrato de exit codes do scrape.js:
          #   exit 0 → houve eventos novos ou remarcações
          #   exit 2 → sem eventos novos (ciclo normal sem mudanças)
          #   exit 1 → erro real (todos os portos falharam, crash, etc.)
          # O ; captura o exit code antes que o shell possa abortar.
          # Repropaga o código original para o runner registrar corretamente.
          exit $CODE
        continue-on-error: true
 
      - name: Commit e push
        if: always()
        run: |
          set -e
 
          CODE="${{ steps.scrape.outputs.exit_code }}"
          echo "Exit code do scrape: $CODE"
 
          # exit 1 = erro real → não commita
          # exit 0 ou 2 = fluxo normal → continua
          if [ "$CODE" = "1" ] || [ -z "$CODE" ]; then
            echo "Scrape terminou com erro real (exit $CODE) — commit abortado."
            exit 1
          fi
 
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          git add \
            data/vessels.json \
            data/estado_atual.json \
            data/eventos/ \
            data/snapshots/ \
            data/metricas/ \
            data/embarcacoes/ \
            data/descartes/ || true
 
          if git diff --staged --quiet; then
            echo "Nenhuma alteração nos dados — commit ignorado."
            exit 0
          fi
 
          MSG="data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git commit -m "$MSG"
          echo "Commit criado: $MSG"
 
          PUSHED=0
          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push realizado com sucesso na tentativa $i."
              PUSHED=1
              break
            fi
            WAIT=$((i * 10))
            echo "Push falhou na tentativa $i. Aguardando ${WAIT}s antes de tentar novamente..."
            sleep $WAIT
          done
 
          if [ "$PUSHED" -eq 0 ]; then
            echo "ERRO: push falhou após 5 tentativas."
            exit 1
          fi
